name: Daily extract players

on:
  schedule:
    # Note: GitHub Actions schedule times are UTC.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth pandas

      - name: Run extractor
        env:
          # Google Drive auth using your personal Google account (OAuth)
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          # Drive locations (store as GitHub Secrets or repo vars)
          SOURCE_FOLDER_ID: ${{ secrets.SOURCE_FOLDER_ID }}
          DEST_FOLDER_ID: ${{ secrets.DEST_FOLDER_ID }}
          SOURCE_EXT: .hud
          OUTPUT_CSV: players_id.csv
        run: python extract-players-id.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: players-csv
          path: players_id.csv
